<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для тебе ♡</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">

    <div class="soft-line line-a"></div>
    <div class="soft-line line-b"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-yellow"></div>
    <div class="orb orb-green"></div>

    <section class="hero reveal">
      <img class="sticker hero-doodle float-soft" src="images/doodle1.png" alt="">
      <img class="sticker hero-arrow wiggle" src="images/arrow.png" alt="">
      <img class="sticker hero-flower float-soft" src="images/flowers1.png" alt="">

      <p class="label">з любовʼю ♡</p>

      <h1>для моєї<br>любімки<br></h1>

      <div class="note torn">
        <p>
          від Жаннуськи-пампуськи<br>
          для Оксуськи-Пікмуськи ♡
        </p>
      </div>

      <button id="surpriseBtn">натисни сюди</button>

      <div class="secret" id="surpriseText">
        ти у мене найкраща ♡
      </div>

      <p class="scroll">гортай вниз ↓</p>
    </section>

    <section class="section film-section reveal">
      <h2>наші спогади</h2>

      <div class="film-scene">
        <img class="film-decor decor1 float-soft" src="images/starfish.png" alt="">
        <img class="film-decor decor2 wiggle" src="images/wax.png" alt="">
        <img class="film-decor decor3 float-soft" src="images/cassette.png" alt="">
        <img class="film-decor decor4 wiggle" src="images/clock.png" alt="">

        <div class="film-strip">
          <div class="film-photo"><img src="images/film1.jpg" alt=""></div>
          <div class="film-photo"><img src="images/film2.jpg" alt=""></div>
          <div class="film-photo"><img src="images/film3.jpg" alt=""></div>
          <div class="film-photo"><img src="images/film4.jpg" alt=""></div>
        </div>
      </div>
    </section>

    <section class="section reveal">
      <h2>трошки про тебе</h2>

      <div class="funny-scene">
        <div class="arrow-note">тут ти</div>

        <img class="fun-sticker fun-flower float-soft" src="images/flowers3.png" alt="">
        <img class="fun-sticker fun-ticket wiggle" src="images/ticket.png" alt="">

        <div class="fun-window">
          <button class="side-btn" id="prevFunny">‹</button>

          <div class="fun-card">
            <img id="funnyPhoto" src="images/film5.jpg" alt="">

            <div class="fun-text">
              <p id="funnyTitle">коли ти дуже serious girl</p>
              <span id="funnyCaption">мені це подобається</span>
            </div>
          </div>

          <button class="side-btn" id="nextFunny">›</button>
        </div>
      </div>
    </section>

    <section class="section reveal letter-section">
      <h2>приємний бонусік</h2>

      <img class="letter-sticker letter-flowers float-soft" src="images/flowers2.png" alt="">

      <div class="letter">
        <p>
          Але тут залишилось - найголовніше для тебе
        </p>

        <p>
          ♡
        </p>

        <button id="loveButton">тицяй</button>

        <div class="secret" id="message">
          ти головна моя пікмуся
        </div>
      </div>

      <div class="monkey-box" id="monkeyBox">
        <div class="boom" id="boomEffect">✦ ♡ ✦</div>
        <img class="letter-monkey" src="images/monkey.png" alt="">
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
